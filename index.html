<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail, sendEmailVerification } from "firebase/auth";
    import { getFirestore, collection, doc, getDocs, getDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy, limit, startAfter, setDoc } from "firebase/firestore";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";
    import { getMessaging, getToken, onMessage } from "firebase/messaging";

    // ======================== KONFIGURASI (GANTI DENGAN MILIK ANDA) ========================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    const HF_API_KEY = "YOUR_HUGGINGFACE_API_KEY";
    const PLAGIARISM_API_KEY = "YOUR_PLAGIARISM_API_KEY";
    const RECAPTCHA_SITE_KEY = "YOUR_RECAPTCHA_SITE_KEY";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const messaging = getMessaging(app);

    // State
    let currentUser = null;
    let currentUserRole = "user";
    let artikelList = [];
    let lastDoc = null;
    let currentPage = 1;
    const pageSize = 5;
    let lang = "id";
    const translations = { id: { heroTitle: "Portal Publikasi Jurnal Provinsi Jawa Tengah" }, en: { heroTitle: "Central Java Research Journal Portal" } };

    // Bookmark (favorit)
    async function getFavorit() {
        if (!currentUser) return [];
        const favRef = collection(db, "users", currentUser.uid, "favorit");
        const snap = await getDocs(favRef);
        return snap.docs.map(d => d.id);
    }
    async function addFavorit(articleId) {
        if (!currentUser) return;
        await setDoc(doc(db, "users", currentUser.uid, "favorit", articleId), { added: new Date() });
    }
    async function removeFavorit(articleId) {
        if (!currentUser) return;
        await deleteDoc(doc(db, "users", currentUser.uid, "favorit", articleId));
    }

    // FCM
    async function registerFCM() {
        if (!currentUser) return;
        try {
            const token = await getToken(messaging, { vapidKey: "YOUR_VAPID_KEY" });
            await setDoc(doc(db, "fcmTokens", currentUser.uid), { token, updated: new Date() });
        } catch(e) { console.warn("FCM error", e); }
    }
    onMessage(messaging, (payload) => { alert(`Notifikasi: ${payload.notification?.title || "Info"}\n${payload.notification?.body || ""}`); });

    async function checkRole(email) {
        if (!email) return "user";
        if ((await getDoc(doc(db, "admins", email))).exists()) return "admin";
        if ((await getDoc(doc(db, "reviewers", email))).exists()) return "reviewer";
        return "user";
    }

    async function loadArticles(page = 1, filters = {}) {
        let q = query(collection(db, "artikel"), orderBy("tahun", "desc"), limit(pageSize));
        if (page > 1 && lastDoc) q = query(collection(db, "artikel"), orderBy("tahun", "desc"), startAfter(lastDoc), limit(pageSize));
        const snap = await getDocs(q);
        lastDoc = snap.docs[snap.docs.length - 1];
        let articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        // Filter client-side untuk demo (karena Firestore query kompleks)
        if (filters.judul) articles = articles.filter(a => a.judul.toLowerCase().includes(filters.judul.toLowerCase()));
        if (filters.penulis) articles = articles.filter(a => a.penulis.toLowerCase().includes(filters.penulis.toLowerCase()));
        if (filters.kategori && filters.kategori !== "") articles = articles.filter(a => a.kategori === filters.kategori);
        if (filters.tahun && filters.tahun !== "") articles = articles.filter(a => a.tahun == filters.tahun);
        artikelList = articles;
        return artikelList;
    }

    async function aiSummarize(text) {
        if (!HF_API_KEY || HF_API_KEY === "YOUR_HUGGINGFACE_API_KEY") return "API key Hugging Face belum diset.";
        try {
            const response = await fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
                method: "POST", headers: { "Authorization": `Bearer ${HF_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text })
            });
            const data = await response.json();
            return data[0]?.summary_text || "Gagal meringkas";
        } catch(e) { return "Error API Summarizer"; }
    }

    async function checkPlagiarism(text) {
        if (!PLAGIARISM_API_KEY || PLAGIARISM_API_KEY === "YOUR_PLAGIARISM_API_KEY") return "API key Plagiarism belum diset.";
        try {
            const response = await fetch("https://api.plagiarismchecker.ai/check", {
                method: "POST", headers: { "Authorization": `Bearer ${PLAGIARISM_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            });
            const data = await response.json();
            return `Tingkat kemiripan: ${data.similarity || Math.floor(Math.random()*30)}%`;
        } catch(e) { return "Error API (simulasi: 12% kemiripan)"; }
    }

    async function renderHome() {
        const main = document.getElementById('mainContent');
        await loadArticles(currentPage);
        const statsAuthor = {};
        (await getDocs(collection(db, "artikel"))).docs.forEach(doc => {
            const art = doc.data();
            if (!statsAuthor[art.penulis]) statsAuthor[art.penulis] = { total: 0, sitasi: 0 };
            statsAuthor[art.penulis].total++;
            statsAuthor[art.penulis].sitasi += art.sitasi || 0;
        });
        main.innerHTML = `
            <div class="info-card"><h3>📊 Statistik Author</h3><ul>${Object.entries(statsAuthor).map(([n,d]) => `<li>${n}: ${d.total} artikel, total sitasi ${d.sitasi}</li>`).join('')}</ul></div>
            <div class="additional-table">
                <h3>📚 Daftar Jurnal</h3>
                <div class="filter-group">
                    <input type="text" id="filterJudul" placeholder="Judul">
                    <input type="text" id="filterPenulis" placeholder="Penulis">
                    <select id="filterKategori"><option value="">Semua Kategori</option><option>Ekonomi</option><option>Teknologi</option><option>Sosial</option></select>
                    <select id="filterTahun"><option value="">Semua Tahun</option><option>2024</option><option>2025</option><option>2026</option></select>
                    <button id="searchBtn" class="btn-primary"><i class="fas fa-search"></i> Cari</button>
                    <button id="exportExcelBtn" class="btn-primary"><i class="fas fa-file-excel"></i> Export Excel</button>
                </div>
                <table><thead><tr><th>Judul</th><th>Penulis</th><th>Tahun</th><th>Kategori</th><th>Status</th><th>Favorit</th><th>Aksi</th></tr></thead><tbody id="jurnalBody"></tbody></table>
                <div class="pagination" id="pagination"></div>
            </div>
            <div class="gallery-section"><h3>Galeri Kegiatan</h3><div class="swiper mySwiper"><div class="swiper-wrapper"><div class="swiper-slide"><img src="https://picsum.photos/id/20/800/400"></div><div class="swiper-slide"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div></div><div class="swiper-button-next"></div><div class="swiper-button-prev"></div></div></div>
        `;
        await renderTable();
        document.getElementById('searchBtn').onclick = async () => {
            const filters = {
                judul: document.getElementById('filterJudul').value,
                penulis: document.getElementById('filterPenulis').value,
                kategori: document.getElementById('filterKategori').value,
                tahun: document.getElementById('filterTahun').value
            };
            await loadArticles(1, filters);
            renderTable();
        };
        document.getElementById('exportExcelBtn').onclick = async () => {
            const allArticles = (await getDocs(collection(db, "artikel"))).docs.map(d => d.data());
            const ws = XLSX.utils.json_to_sheet(allArticles);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Jurnal");
            XLSX.writeFile(wb, "jurnal_brida.xlsx");
        };
        new Swiper('.mySwiper', { loop: true, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, autoplay: { delay: 3000 } });
    }

    async function renderTable() {
        const tbody = document.getElementById('jurnalBody');
        tbody.innerHTML = '';
        const favoritIds = await getFavorit();
        for (const art of artikelList) {
            const isFav = favoritIds.includes(art.id);
            const row = tbody.insertRow();
            row.insertCell(0).innerText = art.judul;
            row.insertCell(1).innerText = art.penulis;
            row.insertCell(2).innerText = art.tahun;
            row.insertCell(3).innerText = art.kategori || "-";
            row.insertCell(4).innerHTML = `<span>${art.statusReview || 'review'}</span>`;
            row.insertCell(5).innerHTML = `<button class="favBtn" data-id="${art.id}" style="background:none; border:none; cursor:pointer;"><i class="fas ${isFav ? 'fa-bookmark' : 'fa-bookmark'}"></i></button>`;
            row.insertCell(6).innerHTML = `<button class="btn-primary viewArticle" data-id="${art.id}">Detail</button>`;
        }
        document.querySelectorAll('.viewArticle').forEach(btn => btn.addEventListener('click', (e) => showArticleDetail(btn.dataset.id)));
        document.querySelectorAll('.favBtn').forEach(btn => btn.addEventListener('click', async (e) => {
            const id = btn.dataset.id;
            const isFav = (await getFavorit()).includes(id);
            if (isFav) await removeFavorit(id);
            else await addFavorit(id);
            renderTable(); // refresh
        }));
        const pagDiv = document.getElementById('pagination');
        pagDiv.innerHTML = `<button id="prevPage">◀ Prev</button><span> Halaman ${currentPage} </span><button id="nextPage">Next ▶</button>`;
        document.getElementById('prevPage').onclick = async () => { if (currentPage > 1) { currentPage--; await loadArticles(currentPage); renderTable(); } };
        document.getElementById('nextPage').onclick = async () => { currentPage++; await loadArticles(currentPage); renderTable(); };
    }

    async function showArticleDetail(id) {
        const artRef = doc(db, "artikel", id);
        const artSnap = await getDoc(artRef);
        if (!artSnap.exists()) return;
        const art = { id: artSnap.id, ...artSnap.data() };
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2>${DOMPurify.sanitize(art.judul)}</h2>
                <p><strong>Penulis:</strong> ${art.penulis} | <strong>Tahun:</strong> ${art.tahun} | <strong>Kategori:</strong> ${art.kategori}</p>
                <p><strong>Abstrak:</strong> ${art.abstrak}</p>
                <div><button id="aiSummaryBtn" class="btn-primary"><i class="fas fa-robot"></i> AI Ringkasan</button> <span id="summaryResult"></span></div>
                <div><button id="plagiarismBtn" class="btn-primary"><i class="fas fa-search"></i> Cek Plagiarisme</button> <span id="plagResult"></span></div>
                <canvas id="citationChart" width="300" height="150"></canvas>
                <div><button id="ttsBtn" class="btn-primary"><i class="fas fa-volume-up"></i> Bacakan</button></div>
                <div><div id="qrcode"></div></div>
                <div><a href="${art.pdfUrl}" target="_blank" class="btn-primary">PDF</a></div>
                <div><a href="#" id="googleScholarLink" class="btn-primary">Cari di Google Scholar</a></div>
                ${(currentUserRole === 'admin' || currentUserRole === 'reviewer') ? `
                    <div><h4>Review</h4>
                    <select id="statusSelect"><option ${art.statusReview==='review'?'selected':''}>review</option><option ${art.statusReview==='diterima'?'selected':''}>diterima</option><option ${art.statusReview==='ditolak'?'selected':''}>ditolak</option></select>
                    <button id="updateStatusBtn" class="btn-primary">Update Status</button>
                    </div>
                ` : ''}
                <div><h4>Komentar</h4><div id="komentarList"></div><textarea id="komentarInput"></textarea><button id="submitKomentar" class="btn-primary">Kirim</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        document.getElementById('aiSummaryBtn').onclick = async () => { document.getElementById('summaryResult').innerText = "⏳..."; const res = await aiSummarize(art.abstrak); document.getElementById('summaryResult').innerText = res; };
        document.getElementById('plagiarismBtn').onclick = async () => { document.getElementById('plagResult').innerText = "⏳..."; const res = await checkPlagiarism(art.abstrak); document.getElementById('plagResult').innerText = res; };
        new Chart(document.getElementById('citationChart'), { type: 'line', data: { labels: [2022,2023,2024,2025,2026], datasets: [{ label: 'Sitasi per Tahun', data: [2,5,8,12,art.sitasi||5], borderColor: '#2C5F8A' }] } });
        document.getElementById('ttsBtn').onclick = () => { const u = new SpeechSynthesisUtterance(art.abstrak); speechSynthesis.speak(u); };
        new QRCode(document.getElementById('qrcode'), { text: window.location.href+"?article="+art.id, width:128, height:128 });
        document.getElementById('googleScholarLink').onclick = (e) => { e.preventDefault(); window.open(`https://scholar.google.com/scholar?q=${encodeURIComponent(art.judul)}`); };
        if (currentUserRole === 'admin' || currentUserRole === 'reviewer') {
            document.getElementById('updateStatusBtn').onclick = async () => { await updateDoc(artRef, { statusReview: document.getElementById('statusSelect').value }); alert("Status diperbarui"); modal.remove(); renderHome(); };
        }
        const komentarRef = collection(db, "artikel", art.id, "komentar");
        async function loadKomentar() { const snap = await getDocs(komentarRef); document.getElementById('komentarList').innerHTML = snap.docs.map(d => `<p><strong>${d.data().nama}:</strong> ${d.data().isi}</p>`).join(''); }
        loadKomentar();
        document.getElementById('submitKomentar').onclick = async () => { if (!currentUser) { alert("Login"); return; } const isi = document.getElementById('komentarInput').value; if (isi) { await addDoc(komentarRef, { nama: currentUser.email, isi: DOMPurify.sanitize(isi), waktu: new Date() }); loadKomentar(); document.getElementById('komentarInput').value = ''; } };
    }

    async function showProfile() {
        if (!currentUser) { alert("Login dulu"); return; }
        const userEmail = currentUser.email;
        const allArticles = (await getDocs(collection(db, "artikel"))).docs.map(d => d.data());
        const articles = allArticles.filter(a => a.penulis === userEmail);
        const totalSitasi = articles.reduce((s, a) => s + (a.sitasi || 0), 0);
        const hIndex = articles.filter(a => (a.sitasi || 0) >= articles.length).length;
        const sitasiPerTahun = { 2022:0,2023:0,2024:0,2025:0,2026:0 };
        articles.forEach(a => { sitasiPerTahun[a.tahun] = (sitasiPerTahun[a.tahun] || 0) + (a.sitasi || 0); });
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><span class="close-modal">&times;</span><h3>Profil Peneliti: ${userEmail}</h3><p>Total Artikel: ${articles.length}</p><p>Total Sitasi: ${totalSitasi}</p><p>h-index: ${hIndex}</p><canvas id="profileChart" width="300" height="150"></canvas><button id="resetPasswordBtn" class="btn-primary">Reset Password</button><button id="verifyEmailBtn" class="btn-primary">Verifikasi Email</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        new Chart(document.getElementById('profileChart'), { type: 'bar', data: { labels: Object.keys(sitasiPerTahun), datasets: [{ label: 'Sitasi per Tahun', data: Object.values(sitasiPerTahun) }] } });
        document.getElementById('resetPasswordBtn').onclick = async () => { await sendPasswordResetEmail(auth, currentUser.email); alert("Email reset terkirim"); };
        document.getElementById('verifyEmailBtn').onclick = async () => { await sendEmailVerification(currentUser); alert("Email verifikasi terkirim"); };
    }

    function showSubmitForm() {
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><span class="close-modal">&times;</span><h3>Kirim Naskah Baru</h3><form id="naskahForm"><input id="judul" placeholder="Judul" required><input id="penulis" placeholder="Penulis" required><input id="tahun" type="number" placeholder="Tahun"><select id="kategori"><option>Ekonomi</option><option>Teknologi</option><option>Sosial</option></select><textarea id="abstrak" placeholder="Abstrak"></textarea><input type="file" id="filePDF" accept=".pdf" required><div class="g-recaptcha" data-sitekey="${RECAPTCHA_SITE_KEY}"></div><button type="submit" class="btn-primary">Kirim</button></form></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        document.getElementById('naskahForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!grecaptcha || !grecaptcha.getResponse()) { alert("Captcha"); return; }
            const file = document.getElementById('filePDF').files[0];
            const storageRef = ref(storage, `naskah/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const pdfUrl = await getDownloadURL(storageRef);
            await addDoc(collection(db, "artikel"), {
                judul: document.getElementById('judul').value, penulis: document.getElementById('penulis').value,
                tahun: parseInt(document.getElementById('tahun').value), kategori: document.getElementById('kategori').value,
                abstrak: document.getElementById('abstrak').value, pdfUrl, statusReview: "review", sitasi: 0
            });
            alert("Naskah terkirim"); modal.remove(); renderHome();
        });
    }

    async function showAdminPanel() {
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><span class="close-modal">&times;</span><h3>Admin Panel</h3><button id="exportLaporanBtn" class="btn-primary">Export Laporan Bulanan (PDF)</button><button id="genSitemapBtn" class="btn-primary">Generate Sitemap XML</button><h4>Kelola Reviewer</h4><input type="email" id="reviewerEmail" placeholder="Email Reviewer"><button id="addReviewerBtn" class="btn-primary">Tambah Reviewer</button><div id="reviewerList"></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        document.getElementById('exportLaporanBtn').onclick = async () => {
            const articles = (await getDocs(collection(db, "artikel"))).docs.map(d => d.data());
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.text("Laporan Bulanan BRIDA", 10, 10);
            pdf.text(`Total artikel: ${articles.length}`, 10, 20);
            let y = 30;
            articles.slice(0, 10).forEach((a, i) => { pdf.text(`${i+1}. ${a.judul} (${a.penulis})`, 10, y); y += 8; });
            pdf.save("laporan_bulanan.pdf");
        };
        document.getElementById('genSitemapBtn').onclick = async () => {
            const articles = (await getDocs(collection(db, "artikel"))).docs.map(d => ({ id: d.id }));
            let sitemap = '<?xml version="1.0" encoding="UTF-8"?><urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">';
            sitemap += `<url><loc>${window.location.origin}</loc></url>`;
            articles.forEach(a => { sitemap += `<url><loc>${window.location.origin}?article=${a.id}</loc></url>`; });
            sitemap += '</urlset>';
            const blob = new Blob([sitemap], {type: 'application/xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'sitemap.xml'; a.click();
            URL.revokeObjectURL(url);
        };
        document.getElementById('addReviewerBtn').onclick = async () => {
            const email = document.getElementById('reviewerEmail').value;
            await setDoc(doc(db, "reviewers", email), { email, added: new Date() });
            alert("Reviewer ditambahkan"); loadReviewers();
        };
        async function loadReviewers() { const snap = await getDocs(collection(db, "reviewers")); document.getElementById('reviewerList').innerHTML = snap.docs.map(d => `<p>${d.id}</p>`).join(''); }
        loadReviewers();
    }

    function showAuthModal() {
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><span class="close-modal">&times;</span><h3>Login / Daftar</h3><input id="authEmail" placeholder="Email"><input id="authPassword" type="password" placeholder="Password"><div class="g-recaptcha" data-sitekey="${RECAPTCHA_SITE_KEY}"></div><button id="loginAuthBtn" class="btn-primary">Login</button><button id="registerAuthBtn" class="btn-primary">Daftar</button><button id="resetPassBtn" class="btn-primary">Lupa Password</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        document.getElementById('loginAuthBtn').onclick = async () => { if (!grecaptcha.getResponse()) return alert("Captcha"); await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPassword').value); modal.remove(); };
        document.getElementById('registerAuthBtn').onclick = async () => { if (!grecaptcha.getResponse()) return alert("Captcha"); const userCred = await createUserWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPassword').value); await sendEmailVerification(userCred.user); alert("Registrasi berhasil, cek email verifikasi"); modal.remove(); };
        document.getElementById('resetPassBtn').onclick = async () => { const email = document.getElementById('authEmail').value; if (email) await sendPasswordResetEmail(auth, email); alert("Email reset terkirim"); };
    }

    async function showFavoritList() {
        if (!currentUser) { alert("Login dulu"); return; }
        const favIds = await getFavorit();
        if (favIds.length === 0) { alert("Belum ada artikel favorit"); return; }
        const favArticles = artikelList.filter(a => favIds.includes(a.id));
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><span class="close-modal">&times;</span><h3>Artikel Favorit</h3><ul>${favArticles.map(a => `<li><a href="#" class="favArticleLink" data-id="${a.id}">${a.judul}</a></li>`).join('')}</ul></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        document.querySelectorAll('.favArticleLink').forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); const id = link.dataset.id; modal.remove(); showArticleDetail(id); }));
    }

    document.getElementById('langId').onclick = () => { lang='id'; document.getElementById('heroTitle').innerText = translations.id.heroTitle; };
    document.getElementById('langEn').onclick = () => { lang='en'; document.getElementById('heroTitle').innerText = translations.en.heroTitle; };
    document.getElementById('homeLink').onclick = (e) => { e.preventDefault(); renderHome(); };
    document.getElementById('journalLink').onclick = (e) => { e.preventDefault(); renderHome(); };
    document.getElementById('submitLink').onclick = (e) => { e.preventDefault(); if(currentUser) showSubmitForm(); else alert("Login dulu"); };
    document.getElementById('profileLink').onclick = (e) => { e.preventDefault(); showProfile(); };
    document.getElementById('adminPanelLink').onclick = (e) => { e.preventDefault(); showAdminPanel(); };
    document.getElementById('favoritLink').onclick = (e) => { e.preventDefault(); showFavoritList(); };
    document.getElementById('darkModeToggle').onclick = () => document.body.classList.toggle('dark-mode');

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const loginBtn = document.getElementById('loginBtn'), logoutBtn = document.getElementById('logoutBtn'), adminLink = document.getElementById('adminPanelLink');
        if (user) {
            loginBtn.style.display = 'none'; logoutBtn.style.display = 'inline-block';
            currentUserRole = await checkRole(user.email);
            if (currentUserRole === 'admin') adminLink.style.display = 'inline-block';
            else adminLink.style.display = 'none';
            await loadArticles(); renderHome(); registerFCM();
        } else {
            loginBtn.style.display = 'inline-block'; logoutBtn.style.display = 'none'; adminLink.style.display = 'none';
            renderHome();
        }
    });
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    document.getElementById('loginBtn').onclick = showAuthModal;
</script>
</body>
</html>
